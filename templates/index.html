<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperFoundry</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="app-header">
  <span class="logo">PaperFoundry</span>
  <input type="text" class="search-bar" placeholder="Search papers, topics, keywords…" disabled>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="discovery">Discovery</button>
  <button class="tab-btn" data-tab="library">Library</button>
  <button class="tab-btn" data-tab="topics">Topics</button>
  <button class="settings-btn" title="Clean tmp folder" onclick="cleanTmp(this)">&#128465;</button>
  <button class="settings-btn" title="Settings">&#9881;</button>
</nav>

<main class="page-content">

  <!-- ════════════════════════════════════════ DISCOVERY TAB ════ -->
  <div id="tab-discovery" class="tab active">

    <div class="card" style="margin-bottom:16px;padding:10px 16px">
      <div style="display:flex;gap:10px;align-items:end;flex-wrap:wrap">
        <button class="btn btn-primary" id="fetch-btn" onclick="fetchPapers()" style="white-space:nowrap">Fetch &amp; Filter</button>
        <div style="flex:2;min-width:140px">
          <label for="fetch-cats" style="margin-bottom:2px">Categories</label>
          <input type="text" id="fetch-cats" placeholder="cs.GR cs.CV" value="cs.GR cs.CV" style="width:100%">
        </div>
        <div style="min-width:120px">
          <label for="fetch-from" style="margin-bottom:2px">From</label>
          <input type="date" id="fetch-from" style="width:100%">
        </div>
        <div style="min-width:120px">
          <label for="fetch-to" style="margin-bottom:2px">To</label>
          <input type="date" id="fetch-to" style="width:100%">
        </div>
        <div style="width:70px">
          <label for="fetch-max" style="margin-bottom:2px">Max</label>
          <input type="number" id="fetch-max" value="50" min="1" max="500" style="width:100%">
        </div>
        <span id="fetch-status" style="font-size:12px;color:var(--text-dim)"></span>
      </div>
      <div id="fetch-error"></div>
    </div>

    <div id="discovery-columns">
      <div id="disc-left"></div>
      <div id="disc-middle">
        <div id="fetch-results"></div>
      </div>
      <div id="disc-right">
        <div id="detail-panel-header">
          <span id="detail-panel-title">Paper</span>
        </div>
        <div id="detail-panel-body">
          <div class="empty">Select a paper to view details</div>
        </div>
      </div>
    </div>
    <div id="save-bar" style="display:none">
      <span id="save-count">0 selected</span>
      <button class="btn btn-primary" id="analyze-sel-btn" onclick="analyzeSelected()">Analyze</button>
      <button class="btn btn-primary" onclick="saveSelected()">Save to Library</button>
      <button class="btn" style="background:var(--surface2);border:1px solid var(--border);color:var(--text-dim)" onclick="clearSelection()">Clear</button>
    </div>

  </div>

  <!-- ════════════════════════════════════════ LIBRARY TAB ════ -->
  <div id="tab-library" class="tab">

    <div id="library-columns">
      <div id="lib-left"></div>
      <div id="lib-middle">
        <div id="lib-summary"></div>
        <div id="lib-results"></div>
      </div>
      <div id="lib-right">
        <div id="lib-detail-header">
          <span id="lib-detail-title">Paper</span>
        </div>
        <div id="lib-detail-body">
          <div class="empty">Select a paper to view details</div>
        </div>
      </div>
    </div>

  </div>

  <!-- ════════════════════════════════════════ TOPICS TAB ════ -->
  <div id="tab-topics" class="tab">

    <div id="topics-columns">
      <div id="topics-left">
        <h3>Topics</h3>
        <div id="topics-list"></div>
        <div id="add-topic-section">
          <div class="form-group" style="margin-bottom:8px">
            <input type="text" id="new-topic-name" placeholder="New topic name…" style="width:100%">
          </div>
          <div class="form-group" style="margin-bottom:8px">
            <input type="text" id="new-topic-keywords" placeholder="Keywords (comma-separated)" style="width:100%">
          </div>
          <button class="btn btn-primary" style="width:100%;font-size:12px;padding:5px 0" onclick="addTopic()">Add Topic</button>
          <div id="add-error"></div>
        </div>
      </div>
      <div id="topics-right">
        <div id="topic-detail-header">
          <span id="topic-detail-title">Topic</span>
        </div>
        <div id="topic-detail-body">
          <div class="empty">Select a topic to view details</div>
        </div>
      </div>
    </div>

  </div>

</main>

<div id="log-panel" class="log-panel collapsed">
  <div class="log-panel-header" onclick="toggleLogPanel()">
    <span class="log-panel-title">Log</span>
    <span id="log-badge" class="log-badge" style="display:none">0</span>
    <span class="log-panel-chevron">&#9650;</span>
  </div>
  <div class="log-panel-body" id="log-panel-body"></div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
