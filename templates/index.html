<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperFoundry</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1b1e;
    --surface: #25262b;
    --surface2: #2c2e33;
    --border: #373a40;
    --text: #c1c2c5;
    --text-dim: #7c7f86;
    --accent: #4dabf7;
    --accent-hover: #74c0fc;
    --danger: #ff6b6b;
    --danger-hover: #ff8787;
    --green: #69db7c;
    --chip-bg: #1c3a5e;
    --chip-text: #74c0fc;
    --radius: 6px;
    --font: 'Segoe UI', system-ui, sans-serif;
    --mono: 'Cascadia Code', 'Consolas', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 32px;
    height: 52px;
  }

  .logo {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  nav { display: flex; gap: 4px; }

  nav button {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: var(--radius);
    transition: color .15s, background .15s;
  }

  nav button:hover { background: var(--surface2); color: var(--text); }
  nav button.active { background: var(--surface2); color: var(--accent); }

  /* ── Main ── */
  main { max-width: 100%; margin: 32px auto; padding: 0 24px; }

  .tab { display: none; }
  .tab.active { display: block; }

  /* ── Section headers ── */
  h2 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .topic-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
  }

  /* ── Chips ── */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  .chip {
    background: var(--chip-bg);
    color: var(--chip-text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
  }

  /* ── Buttons ── */
  button.btn {
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    padding: 7px 16px;
    transition: background .15s;
  }

  button.btn-primary { background: var(--accent); color: #fff; }
  button.btn-primary:hover { background: var(--accent-hover); }
  button.btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  button.btn-danger { background: none; border: 1px solid var(--border); color: var(--danger); padding: 4px 10px; font-size: 12px; }
  button.btn-danger:hover { background: rgba(255,107,107,.12); border-color: var(--danger); }

  /* ── Forms ── */
  .form-group { margin-bottom: 14px; }

  label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }

  input[type=text], input[type=number], input[type=date] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font: inherit;
    font-size: 13px;
    padding: 7px 10px;
    width: 100%;
    transition: border-color .15s;
  }

  input[type=text]:focus, input[type=number]:focus, input[type=date]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 12px; align-items: end; }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* ── Add-topic form ── */
  #add-topic-section h2 { margin-bottom: 12px; color: var(--text-dim); font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }

  /* ── Results ── */
  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    margin-bottom: 16px;
    color: var(--text-dim);
    font-size: 13px;
  }

  .summary strong { color: var(--green); }

  .result-group { margin-bottom: 12px; }

  .result-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-weight: 600;
    user-select: none;
  }

  .result-group-header:hover { background: var(--surface2); }

  .result-group-header .count {
    background: var(--chip-bg);
    color: var(--chip-text);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 500;
  }

  .result-group-header .chevron { margin-left: auto; color: var(--text-dim); transition: transform .15s; }
  .result-group-header.open .chevron { transform: rotate(90deg); }

  .result-group-body { display: none; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); }
  .result-group-body.open { display: block; overflow-y: auto; max-height: 400px; }

  .paper-row {
    border-bottom: 1px solid var(--border);
  }

  .paper-row:last-child { border-bottom: none; }

  .paper-title {
    font-size: 13px;
    font-weight: 500;
  }

  .paper-title a {
    color: var(--accent);
    text-decoration: none;
  }

  .paper-title a:hover { text-decoration: underline; }

  .paper-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .paper-chips { margin-top: 5px; }

  /* ── Results layout: sidebar + scroll area ── */
  .results-layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .topic-sidebar {
    width: 180px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    position: sticky;
    top: 0;
  }

  .topic-sidebar h3 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 10px;
  }

  .topic-sidebar label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 0;
    padding: 4px 0;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topic-sidebar input[type=checkbox] {
    width: auto;
    flex-shrink: 0;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .sidebar-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .sidebar-actions button {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    cursor: pointer;
    font: inherit;
    font-size: 11px;
    padding: 4px 0;
    transition: color .15s, background .15s;
  }

  .sidebar-actions button:hover { color: var(--text); background: var(--border); }

  .results-scroll {
    flex: 1;
  }

  /* ── Paper row — clickable + expandable ── */
  .paper-row {
    cursor: pointer;
    user-select: none;
  }

  .paper-row:hover { background: var(--surface2); }

  .paper-row.expanded { background: var(--surface2); }

  .paper-detail {
    display: none;
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
  }

  .paper-row.expanded .paper-detail { display: block; }

  .paper-detail-abstract {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .paper-detail-authors {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .paper-detail-links {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .paper-detail-links a {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--accent);
    font-size: 11px;
    padding: 4px 10px;
    text-decoration: none;
    transition: background .15s;
  }

  .paper-detail-links a:hover { background: var(--border); }

  /* ── Empty state ── */
  .empty {
    color: var(--text-dim);
    font-size: 13px;
    padding: 24px 0;
    text-align: center;
  }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Save bar ── */
  #save-bar {
    position: sticky;
    bottom: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }

  #save-bar #save-count {
    flex: 1;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ── Paper row checkbox ── */
  .paper-select {
    width: auto !important;
    flex-shrink: 0;
    accent-color: var(--accent);
    cursor: pointer;
    margin-top: 2px;
  }

  /* ── Other group styling ── */
  .result-group[data-topic="__other__"] .result-group-header {
    color: var(--text-dim);
  }

  /* ── Library tab ── */
  .library-row {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .library-row:last-child { border-bottom: none; }
  .library-row:hover { background: var(--surface2); }
  .library-row.expanded { background: var(--surface2); }
  .library-row .paper-detail { display: none; padding: 10px 16px 14px; border-top: 1px solid var(--border); }
  .library-row.expanded .paper-detail { display: block; }

  /* ── Error ── */
  .error-msg {
    background: rgba(255, 107, 107, .1);
    border: 1px solid rgba(255, 107, 107, .3);
    border-radius: var(--radius);
    color: var(--danger);
    font-size: 13px;
    padding: 10px 14px;
    margin-top: 12px;
  }
</style>
</head>
<body>

<header>
  <span class="logo">PaperFoundry</span>
  <nav>
    <button class="active" onclick="switchTab('topics', this)">Topics</button>
    <button onclick="switchTab('papers', this)">Papers</button>
    <button onclick="switchTab('library', this)">Library</button>
  </nav>
</header>

<main>

  <!-- ════════════════════════════════════════ TOPICS TAB ════ -->
  <div id="tab-topics" class="tab active">

    <div id="topics-list">
      <div class="empty">Loading topics…</div>
    </div>

    <hr class="divider">

    <div id="add-topic-section">
      <h2>Add Topic</h2>
      <div class="form-group">
        <label for="new-topic-name">Name</label>
        <input type="text" id="new-topic-name" placeholder="e.g. Neural Rendering">
      </div>
      <div class="form-group">
        <label for="new-topic-keywords">Keywords <span style="color:var(--text-dim)">(comma-separated)</span></label>
        <input type="text" id="new-topic-keywords" placeholder="e.g. neural rendering, radiance field, NeRF">
      </div>
      <button class="btn btn-primary" onclick="addTopic()">Add Topic</button>
      <div id="add-error"></div>
    </div>

  </div>

  <!-- ════════════════════════════════════════ PAPERS TAB ════ -->
  <div id="tab-papers" class="tab">

    <div class="card" style="margin-bottom:20px">
      <h2 style="margin-bottom:14px">Fetch Papers</h2>

      <div class="form-row-3">
        <div class="form-group" style="margin-bottom:0">
          <label for="fetch-cats">Categories</label>
          <input type="text" id="fetch-cats" placeholder="cs.GR cs.CV cs.LG" value="cs.GR cs.CV">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label for="fetch-from">From</label>
          <input type="date" id="fetch-from">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label for="fetch-to">To</label>
          <input type="date" id="fetch-to">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label for="fetch-max">Max per cat.</label>
          <input type="number" id="fetch-max" value="50" min="1" max="500">
        </div>
      </div>

      <div style="margin-top:14px; display:flex; gap:10px; align-items:center">
        <button class="btn btn-primary" id="fetch-btn" onclick="fetchPapers()">Fetch &amp; Filter</button>
        <span id="fetch-status" style="font-size:12px;color:var(--text-dim)"></span>
      </div>
      <div id="fetch-error"></div>
    </div>

    <div id="fetch-results"></div>
    <div id="save-bar" style="display:none">
      <span id="save-count">0 selected</span>
      <button class="btn btn-primary" onclick="saveSelected()">Save to Library</button>
      <button class="btn" style="background:var(--surface2);border:1px solid var(--border);color:var(--text-dim)" onclick="clearSelection()">Clear</button>
    </div>

  </div>

  <!-- ════════════════════════════════════════ LIBRARY TAB ════ -->
  <div id="tab-library" class="tab">

    <div id="library-summary"></div>
    <div id="library-list"></div>

  </div>

</main>

<script>
// ─────────────────────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'library') loadLibrary();
}

// ─────────────────────────────────────────────────────────────
// Topics
// ─────────────────────────────────────────────────────────────
async function loadTopics() {
  const res = await fetch('/api/topics');
  const topics = await res.json();
  renderTopics(topics);
}

function renderTopics(topics) {
  const el = document.getElementById('topics-list');
  if (!topics.length) {
    el.innerHTML = '<div class="empty">No topics yet. Add one below.</div>';
    return;
  }
  el.innerHTML = topics.map(t => `
    <div class="card">
      <div class="card-header">
        <span class="topic-name">${esc(t.name)}</span>
        <button class="btn btn-danger" onclick="deleteTopic(${JSON.stringify(t.name)})">Remove</button>
      </div>
      <div class="chips">
        ${(t.keywords || []).map(k => `<span class="chip">${esc(k)}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

async function addTopic() {
  const name = document.getElementById('new-topic-name').value.trim();
  const raw = document.getElementById('new-topic-keywords').value;
  const keywords = raw.split(',').map(k => k.trim()).filter(Boolean);
  const errEl = document.getElementById('add-error');
  errEl.innerHTML = '';

  if (!name) { errEl.innerHTML = '<div class="error-msg">Name is required.</div>'; return; }

  const res = await fetch('/api/topics', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name, keywords }),
  });

  if (!res.ok) {
    const data = await res.json();
    errEl.innerHTML = `<div class="error-msg">${esc(data.error || 'Error adding topic')}</div>`;
    return;
  }

  document.getElementById('new-topic-name').value = '';
  document.getElementById('new-topic-keywords').value = '';
  loadTopics();
}

async function deleteTopic(name) {
  const res = await fetch('/api/topics/' + encodeURIComponent(name), { method: 'DELETE' });
  if (res.ok) loadTopics();
}

// ─────────────────────────────────────────────────────────────
// Papers
// ─────────────────────────────────────────────────────────────
async function fetchPapers() {
  const categories = document.getElementById('fetch-cats').value.trim().split(/\s+/).filter(Boolean);
  const date_from = document.getElementById('fetch-from').value || null;
  const date_to = document.getElementById('fetch-to').value || null;
  const max_results = parseInt(document.getElementById('fetch-max').value) || 50;
  const errEl = document.getElementById('fetch-error');
  const statusEl = document.getElementById('fetch-status');
  const btn = document.getElementById('fetch-btn');
  errEl.innerHTML = '';

  if (!categories.length) {
    errEl.innerHTML = '<div class="error-msg">Enter at least one category.</div>';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Fetching…';
  statusEl.textContent = '';
  document.getElementById('fetch-results').innerHTML = '';

  try {
    const res = await fetch('/api/fetch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ categories, date_from, date_to, max_results }),
    });

    const data = await res.json();

    if (!res.ok) {
      errEl.innerHTML = `<div class="error-msg">${esc(data.error || 'Fetch failed')}</div>`;
      return;
    }

    renderResults(data);
    statusEl.textContent = `Done — ${data.total_fetched} fetched, ${data.total_matched} matched`;
  } catch (e) {
    errEl.innerHTML = `<div class="error-msg">Request failed: ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Fetch &amp; Filter';
  }
}

// paper data store: id → full paper object (populated on each render)
const paperStore = new Map();

function renderResults(data) {
  const el = document.getElementById('fetch-results');

  if (!data.results || !data.results.length) {
    el.innerHTML = `
      <div class="summary">
        <strong>${data.total_fetched}</strong> papers fetched — <strong style="color:var(--text-dim)">0</strong> matched your topics.
      </div>
      <div class="empty">No papers matched your topics.</div>`;
    return;
  }

  // Populate paper store
  paperStore.clear();
  for (const group of data.results) {
    for (const p of group.papers) paperStore.set(p.id, p);
  }

  const topicCount = data.results.filter(g => g.topic !== '__other__').length;

  // Build sidebar HTML
  let sidebarHtml = `
    <div class="topic-sidebar">
      <h3>Filter topics</h3>`;
  for (const group of data.results) {
    const label = group.topic === '__other__' ? 'Other' : group.topic;
    sidebarHtml += `
      <label title="${esc(label)}">
        <input type="checkbox" checked data-topic="${esc(group.topic)}"
               onchange="filterTopic(this)">
        ${esc(label)} <span style="color:var(--text-dim)">(${group.match_count})</span>
      </label>`;
  }
  sidebarHtml += `
      <div class="sidebar-actions">
        <button onclick="setAllTopics(true)">All</button>
        <button onclick="setAllTopics(false)">None</button>
      </div>
    </div>`;

  // Build groups HTML
  let groupsHtml = `
    <div class="summary">
      <strong>${data.total_fetched}</strong> papers fetched &nbsp;·&nbsp;
      <strong>${data.total_matched}</strong> matched across
      <strong>${topicCount}</strong> topic${topicCount !== 1 ? 's' : ''}
    </div>`;

  for (const group of data.results) {
    const gid = 'g-' + Math.random().toString(36).slice(2);
    const groupLabel = group.topic === '__other__' ? 'Other (unmatched)' : group.topic;
    groupsHtml += `
      <div class="result-group" data-topic="${esc(group.topic)}">
        <div class="result-group-header open" onclick="toggleGroup('${gid}', this)">
          ${esc(groupLabel)}
          <span class="count">${group.match_count}</span>
          <span class="chevron">▶</span>
        </div>
        <div class="result-group-body open" id="${gid}">`;

    for (const p of group.papers) {
      const authors = formatAuthors(p.authors);
      const date = (p.published || '').slice(0, 10);
      const chips = (p.matched_keywords || []).map(k => `<span class="chip">${esc(k)}</span>`).join('');
      const pid = esc(p.id);
      groupsHtml += `
          <div class="paper-row" onclick="togglePaperDetail(this, '${pid}')">
            <div style="padding:10px 16px; display:flex; gap:10px; align-items:flex-start">
              <input type="checkbox" class="paper-select" data-id="${pid}"
                     onclick="event.stopPropagation(); updateSaveBar()">
              <div style="flex:1">
                <div class="paper-title">${esc(p.title)}</div>
                <div class="paper-meta">${esc(authors)} &nbsp;·&nbsp; ${esc(date)}
                  &nbsp;·&nbsp; <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">${pid}</span>
                </div>
                ${chips ? `<div class="paper-chips chips">${chips}</div>` : ''}
              </div>
            </div>
            <div class="paper-detail"></div>
          </div>`;
    }

    groupsHtml += `</div></div>`;
  }

  el.innerHTML = `
    <div class="results-layout">
      ${sidebarHtml}
      <div class="results-scroll">${groupsHtml}</div>
    </div>`;
}

function toggleGroup(id, header) {
  header.classList.toggle('open');
  document.getElementById(id).classList.toggle('open');
}

function togglePaperDetail(row, paperId) {
  const detailEl = row.querySelector('.paper-detail');
  if (!detailEl) return;

  // Lazy-render detail content on first expand
  if (!detailEl.dataset.rendered) {
    const p = paperStore.get(paperId);
    if (p) {
      const allAuthors = (p.authors || []).map(a => esc(a)).join(', ');
      const catChips = (p.categories || []).map(c => `<span class="chip">${esc(c)}</span>`).join('');
      const pdfUrl = p.url ? p.url.replace('/abs/', '/pdf/') : '';
      detailEl.innerHTML = `
        <div class="paper-detail-abstract">${esc(p.abstract || 'No abstract available.')}</div>
        <div class="paper-detail-authors"><strong style="color:var(--text)">Authors:</strong> ${allAuthors || '—'}</div>
        ${catChips ? `<div class="chips" style="margin-bottom:4px">${catChips}</div>` : ''}
        <div class="paper-detail-links">
          <a href="${esc(p.url)}" target="_blank" rel="noopener">View on arXiv</a>
          ${pdfUrl ? `<a href="${esc(pdfUrl)}" target="_blank" rel="noopener">Download PDF</a>` : ''}
        </div>`;
      detailEl.dataset.rendered = '1';
    }
  }

  row.classList.toggle('expanded');
}

function filterTopic(checkbox) {
  const topic = checkbox.dataset.topic;
  const group = document.querySelector(`.result-group[data-topic="${CSS.escape(topic)}"]`);
  if (group) group.style.display = checkbox.checked ? '' : 'none';
}

function setAllTopics(checked) {
  document.querySelectorAll('.topic-sidebar input[type=checkbox]').forEach(cb => {
    cb.checked = checked;
    filterTopic(cb);
  });
}

// ─────────────────────────────────────────────────────────────
// Save bar
// ─────────────────────────────────────────────────────────────
function updateSaveBar() {
  const checked = document.querySelectorAll('.paper-select:checked');
  const bar = document.getElementById('save-bar');
  const countEl = document.getElementById('save-count');
  if (checked.length > 0) {
    bar.style.display = 'flex';
    countEl.textContent = `${checked.length} selected`;
  } else {
    bar.style.display = 'none';
  }
}

function clearSelection() {
  document.querySelectorAll('.paper-select:checked').forEach(cb => { cb.checked = false; });
  updateSaveBar();
}

async function saveSelected() {
  const checked = [...document.querySelectorAll('.paper-select:checked')];
  const papers = checked.map(cb => paperStore.get(cb.dataset.id)).filter(Boolean);
  if (!papers.length) return;

  const res = await fetch('/api/library', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ papers }),
  });
  const data = await res.json();

  clearSelection();
  const statusEl = document.getElementById('fetch-status');
  statusEl.textContent = `Saved ${data.added} paper${data.added !== 1 ? 's' : ''} (library: ${data.total})`;
}

// ─────────────────────────────────────────────────────────────
// Library
// ─────────────────────────────────────────────────────────────
async function loadLibrary() {
  const res = await fetch('/api/library');
  const data = await res.json();
  renderLibrary(data.papers || []);
}

function renderLibrary(papers) {
  const summaryEl = document.getElementById('library-summary');
  const listEl = document.getElementById('library-list');

  summaryEl.innerHTML = `<div class="summary"><strong>${papers.length}</strong> saved paper${papers.length !== 1 ? 's' : ''}</div>`;

  if (!papers.length) {
    listEl.innerHTML = '<div class="empty">No papers saved yet.</div>';
    return;
  }

  let html = `<div style="border:1px solid var(--border);border-radius:var(--radius)">`;
  for (const p of papers) {
    const authors = formatAuthors(p.authors);
    const date = (p.published || '').slice(0, 10);
    const saved = (p.saved_at || '').slice(0, 10);
    const pid = esc(p.id);
    html += `
      <div class="library-row" onclick="toggleLibraryDetail(this, '${pid}')">
        <div style="padding:10px 16px; display:flex; gap:10px; align-items:flex-start">
          <div style="flex:1">
            <div class="paper-title">${esc(p.title)}</div>
            <div class="paper-meta">${esc(authors)} &nbsp;·&nbsp; ${esc(date)}
              &nbsp;·&nbsp; <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">${pid}</span>
              ${saved ? `&nbsp;·&nbsp; <span style="color:var(--text-dim)">saved ${esc(saved)}</span>` : ''}
            </div>
          </div>
          <button class="btn btn-danger" onclick="event.stopPropagation(); removeFromLibrary('${pid}')">Remove</button>
        </div>
        <div class="paper-detail" data-pid="${pid}"></div>
      </div>`;
  }
  html += `</div>`;
  listEl.innerHTML = html;

  // Populate detail store for library rows
  for (const p of papers) libraryStore.set(p.id, p);
}

const libraryStore = new Map();

function toggleLibraryDetail(row, paperId) {
  const detailEl = row.querySelector('.paper-detail');
  if (!detailEl) return;

  if (!detailEl.dataset.rendered) {
    const p = libraryStore.get(paperId);
    if (p) {
      const allAuthors = (p.authors || []).map(a => esc(a)).join(', ');
      const catChips = (p.categories || []).map(c => `<span class="chip">${esc(c)}</span>`).join('');
      const pdfUrl = p.url ? p.url.replace('/abs/', '/pdf/') : '';
      detailEl.innerHTML = `
        <div class="paper-detail-abstract">${esc(p.abstract || 'No abstract available.')}</div>
        <div class="paper-detail-authors"><strong style="color:var(--text)">Authors:</strong> ${allAuthors || '—'}</div>
        ${catChips ? `<div class="chips" style="margin-bottom:4px">${catChips}</div>` : ''}
        <div class="paper-detail-links">
          <a href="${esc(p.url)}" target="_blank" rel="noopener">View on arXiv</a>
          ${pdfUrl ? `<a href="${esc(pdfUrl)}" target="_blank" rel="noopener">Download PDF</a>` : ''}
        </div>`;
      detailEl.dataset.rendered = '1';
    }
  }

  row.classList.toggle('expanded');
}

async function removeFromLibrary(paperId) {
  const res = await fetch('/api/library/' + encodeURIComponent(paperId), { method: 'DELETE' });
  if (res.ok) loadLibrary();
}

// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatAuthors(authors) {
  if (!authors || !authors.length) return '';
  if (authors.length <= 3) return authors.join(', ');
  return authors.slice(0, 3).join(', ') + ' et al.';
}

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────

// Set sensible default date range (last 30 days)
(function () {
  const today = new Date();
  const prior = new Date(today);
  prior.setDate(prior.getDate() - 30);
  const fmt = d => d.toISOString().slice(0, 10);
  document.getElementById('fetch-to').value = fmt(today);
  document.getElementById('fetch-from').value = fmt(prior);
})();

loadTopics();
</script>
</body>
</html>
