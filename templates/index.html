<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperFoundry</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
  <span class="logo">PaperFoundry</span>
  <nav>
    <button class="active" onclick="switchTab('topics', this)">Topics</button>
    <button onclick="switchTab('papers', this)">Papers</button>
    <button onclick="switchTab('library', this)">Library</button>
  </nav>
</header>

<main>

  <!-- ════════════════════════════════════════ TOPICS TAB ════ -->
  <div id="tab-topics" class="tab active">

    <div id="topics-list">
      <div class="empty">Loading topics…</div>
    </div>

    <hr class="divider">

    <div id="add-topic-section">
      <h2>Add Topic</h2>
      <div class="form-group">
        <label for="new-topic-name">Name</label>
        <input type="text" id="new-topic-name" placeholder="e.g. Neural Rendering">
      </div>
      <div class="form-group">
        <label for="new-topic-keywords">Keywords <span style="color:var(--text-dim)">(comma-separated)</span></label>
        <input type="text" id="new-topic-keywords" placeholder="e.g. neural rendering, radiance field, NeRF">
      </div>
      <button class="btn btn-primary" onclick="addTopic()">Add Topic</button>
      <div id="add-error"></div>
    </div>

  </div>

  <!-- ════════════════════════════════════════ PAPERS TAB ════ -->
  <div id="tab-papers" class="tab">

    <div class="card" style="margin-bottom:20px">
      <h2 style="margin-bottom:14px">Fetch Papers</h2>

      <div class="form-row-3">
        <div class="form-group" style="margin-bottom:0">
          <label for="fetch-cats">Categories</label>
          <input type="text" id="fetch-cats" placeholder="cs.GR cs.CV cs.LG" value="cs.GR cs.CV">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label for="fetch-from">From</label>
          <input type="date" id="fetch-from">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label for="fetch-to">To</label>
          <input type="date" id="fetch-to">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label for="fetch-max">Max per cat.</label>
          <input type="number" id="fetch-max" value="50" min="1" max="500">
        </div>
      </div>

      <div style="margin-top:14px; display:flex; gap:10px; align-items:center">
        <button class="btn btn-primary" id="fetch-btn" onclick="fetchPapers()">Fetch &amp; Filter</button>
        <span id="fetch-status" style="font-size:12px;color:var(--text-dim)"></span>
      </div>
      <div id="fetch-error"></div>
    </div>

    <div id="papers-body">
      <div id="papers-col">
        <div id="fetch-results"></div>
        <div id="save-bar" style="display:none">
          <span id="save-count">0 selected</span>
          <button class="btn btn-primary" onclick="saveSelected()">Save to Library</button>
          <button class="btn" style="background:var(--surface2);border:1px solid var(--border);color:var(--text-dim)" onclick="clearSelection()">Clear</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ════════════════════════════════════════ LIBRARY TAB ════ -->
  <div id="tab-library" class="tab">

    <div id="library-body">
      <div id="library-col">
        <div id="library-summary"></div>
        <div id="library-list"></div>
      </div>
    </div>

  </div>

</main>

<div id="detail-panel">
  <div id="detail-panel-header">
    <span id="detail-panel-title"></span>
    <button id="detail-panel-close" onclick="closeDetailPanel()">×</button>
  </div>
  <div id="detail-panel-body"></div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
